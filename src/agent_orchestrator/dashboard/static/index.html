<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestrator Dashboard</title>
    <link rel="stylesheet" href="/static/style.css?v=025">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Agent Orchestrator</h1>
            <span id="status-badge" class="badge idle">IDLE</span>
        </div>
        <div class="header-right">
            <div class="metric">
                <span class="metric-label">Tokens</span>
                <span id="total-tokens" class="metric-value">0</span>
            </div>
            <div class="metric">
                <span class="metric-label">Cost</span>
                <span id="total-cost" class="metric-value">$0.000</span>
            </div>
            <div class="metric">
                <span class="metric-label">Speed</span>
                <span id="token-speed" class="metric-value">- tok/s</span>
            </div>
            <span id="ws-indicator" class="ws-dot disconnected" title="WebSocket"></span>
        </div>
    </header>

    <main>
        <!-- Left: Agent tree -->
        <section class="panel agents-panel">
            <h2>Agents & Skills</h2>
            <div id="agent-tree" class="agent-tree"></div>

            <h2>Inter-Agent Messages</h2>
            <div id="agent-messages" class="agent-messages">
                <div class="empty-state">No messages yet</div>
            </div>

            <h2>Ollama Models</h2>
            <div class="ollama-mgmt">
                <div class="ollama-pull-bar">
                    <input id="ollama-pull-input" type="text" placeholder="model name..." />
                    <button id="btn-ollama-pull" title="Pull model">Pull</button>
                </div>
                <div id="ollama-model-list" class="ollama-model-list"></div>
            </div>
        </section>

        <!-- Center: Graph + Chat -->
        <section class="panel center-panel">
            <!-- Graph visualization -->
            <div class="graph-section">
                <h2>Graph</h2>
                <div id="graph-canvas" class="graph-canvas">
                    <div class="empty-state">Submit a prompt to see the graph</div>
                </div>
            </div>

            <!-- Presets bar -->
            <div class="presets-bar" id="presets-bar"></div>

            <!-- File context bar -->
            <div class="file-context-bar" id="file-context-bar">
                <div class="file-context-header">
                    <span class="file-context-label">File Context</span>
                    <button id="btn-attach-file" class="btn-attach" title="Attach file">+ File</button>
                    <button id="btn-clear-context" class="btn-clear-context" title="Clear context">Clear</button>
                </div>
                <div id="attached-files" class="attached-files"></div>
            </div>

            <!-- Chat area -->
            <div class="chat-section">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-bar">
                    <div class="chat-settings">
                        <select id="prompt-provider" title="Provider">
                            <option value="ollama">Ollama (local)</option>
                            <option value="openrouter">OpenRouter (cloud)</option>
                        </select>
                        <select id="prompt-model" title="Model">
                            <option value="">Loading...</option>
                        </select>
                        <select id="prompt-graph" title="Graph type">
                            <option value="auto">Auto</option>
                            <option value="chat">Chat</option>
                            <option value="review">Code Review</option>
                            <option value="chain">Analyze+Fix</option>
                            <option value="parallel">Parallel</option>
                            <option value="team">Team</option>
                        </select>
                        <label class="stream-toggle">
                            <input id="toggle-stream" type="checkbox" checked />
                            <span>Stream</span>
                        </label>
                    </div>
                    <textarea id="prompt-input" class="chat-input" rows="1"
                              placeholder="Type a prompt..."></textarea>
                    <button id="btn-send" class="btn-send" title="Send (Enter)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Right: Logs / Details -->
        <section class="panel logs-panel">
            <h2>Logs</h2>
            <div class="logs-controls">
                <select id="filter-type">
                    <option value="all">All</option>
                    <option value="agent">Agent</option>
                    <option value="graph">Graph</option>
                    <option value="cooperation">Coop</option>
                </select>
                <button id="btn-clear">Clear</button>
                <button id="btn-new-chat" title="New conversation">New Chat</button>
            </div>
            <div id="timeline" class="timeline"></div>

            <h2>Details</h2>
            <div id="detail-view" class="detail-view">
                <div class="empty-state">Click a graph node or event</div>
            </div>

            <!-- Model Comparison -->
            <h2>Compare</h2>
            <div class="compare-section">
                <div class="compare-controls">
                    <select id="compare-model-a" class="compare-select"></select>
                    <span class="compare-vs">vs</span>
                    <select id="compare-model-b" class="compare-select"></select>
                    <button id="btn-compare" class="btn-compare">Go</button>
                </div>
                <div id="compare-results" class="compare-results">
                    <div class="empty-state">Select 2 models and click Go</div>
                </div>
            </div>
        </section>
    </main>

    <!-- File picker modal -->
    <div id="file-picker-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select File</h3>
                <button id="btn-close-picker" class="btn-close">&times;</button>
            </div>
            <div class="modal-breadcrumb" id="file-breadcrumb"></div>
            <div class="file-list" id="file-list"></div>
        </div>
    </div>

    <script src="/static/app.js?v=025"></script>
</body>
</html>
