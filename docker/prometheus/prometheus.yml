global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # Orchestrator dashboard metrics
  - job_name: "dashboard"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["dashboard:5005"]
        labels:
          service: "agent-orchestrator"

  # Node Exporter (host system metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "ec2-host"

  # cAdvisor (container metrics)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: "containers"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
