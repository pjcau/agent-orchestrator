global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # Orchestrator dashboard metrics
  - job_name: "dashboard"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["dashboard:5005"]
        labels:
          service: "agent-orchestrator"

  # Node Exporter (EC2 system metrics)
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "ec2-host"

  # PostgreSQL (if pg_exporter is added later)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
