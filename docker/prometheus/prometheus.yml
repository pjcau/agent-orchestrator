global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # Orchestrator dashboard metrics (HTTPS with self-signed cert)
  - job_name: "dashboard"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: "/metrics"
    static_configs:
      - targets: ["dashboard:5005"]
        labels:
          service: "agent-orchestrator"

  # Node Exporter (host system metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "ec2-host"

  # cAdvisor (container metrics)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: "containers"

  # AWS Cost Explorer (hourly refresh)
  - job_name: "aws-costs"
    scrape_interval: 5m
    static_configs:
      - targets: ["aws-cost-exporter:9101"]
        labels:
          service: "aws-billing"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
