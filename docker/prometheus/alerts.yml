groups:
  - name: agent-orchestrator
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(orchestrator_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec over the last 5 minutes."

      # Agent stall detection
      - alert: AgentStalled
        expr: orchestrator_agent_task_duration_seconds > 300
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent task stalled"
          description: "Agent task has been running for over 5 minutes."

      # High cost alert
      - alert: HighCostSpike
        expr: increase(orchestrator_cost_usd_total[1h]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Cost spike detected"
          description: "Over $5 spent in the last hour ({{ $value }} USD)."

      # EC2 high CPU
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}%."

      # EC2 high memory
      - alert: HighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%."

      # EC2 disk space
      - alert: LowDiskSpace
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value }}%."

      # S3 high error rate
      - alert: S3HighErrorRate
        expr: sum(aws_s3_errors_total) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High S3 error rate"
          description: "S3 errors: {{ $value }} in the last scrape."

      # S3 bucket growing fast
      - alert: S3BucketLarge
        expr: sum by(bucket) (aws_s3_bucket_size_bytes) > 10737418240
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "S3 bucket {{ $labels.bucket }} exceeds 10 GB"
          description: "Bucket size is {{ $value | humanize1024 }}."

      # Graph node hung > 30s
      - alert: GraphNodeHung
        expr: orchestrator_graph_node_duration_seconds_sum / orchestrator_graph_node_duration_seconds_count > 30
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Graph node average duration > 30s"
          description: "Node {{ $labels.node }} avg duration is {{ $value }}s."

      # LLM call slow > 15s average
      - alert: LLMCallSlow
        expr: orchestrator_llm_call_duration_seconds_sum / orchestrator_llm_call_duration_seconds_count > 15
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM call average latency > 15s"
          description: "Provider {{ $labels.provider }} avg latency is {{ $value }}s."

      # Frontend error spike
      - alert: FrontendErrorSpike
        expr: orchestrator_frontend_errors_total > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frontend errors > 10"
          description: "{{ $value }} frontend JS errors reported."

      # Provider degradation
      - alert: ProviderDegraded
        expr: orchestrator_llm_call_duration_seconds_sum / orchestrator_llm_call_duration_seconds_count > 25
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Provider {{ $labels.provider }} degraded"
          description: "Average LLM call duration is {{ $value }}s."
