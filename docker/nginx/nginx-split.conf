upstream gateway {
    server gateway:5006;
}

upstream runtime {
    server runtime:5007;
}

upstream grafana {
    server grafana:3000;
}

# Rate limiting zone -- 10 req/s per IP, 10 MB shared memory
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# ============================================================
# agents-orchestrator.com -- Split mode routing
#
# /api/prompt, /api/agent/*, /api/team/*, /ws/*  -> runtime:5007
# All other /api/*, /health, /metrics, /auth/*   -> gateway:5006
# ============================================================

server {
    listen 80;
    server_name agents-orchestrator.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        if (-f /etc/nginx/ssl/live/agents-orchestrator.com/fullchain.pem) {
            return 301 https://$host$request_uri;
        }

        proxy_pass https://gateway;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api burst=20 nodelay;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name agents-orchestrator.com;

    ssl_certificate     /etc/nginx/ssl/live/agents-orchestrator.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/agents-orchestrator.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Runtime endpoints (compute-heavy) ---

    location /api/prompt {
        proxy_pass https://runtime;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 10;
        proxy_send_timeout 600;
        limit_req zone=api burst=20 nodelay;
    }

    location /api/agent/ {
        proxy_pass https://runtime;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 10;
        proxy_send_timeout 600;
        limit_req zone=api burst=20 nodelay;
    }

    location /api/team/ {
        proxy_pass https://runtime;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 10;
        proxy_send_timeout 600;
        limit_req zone=api burst=20 nodelay;
    }

    # WebSocket connections (event bus + streaming) go to runtime
    location /ws {
        proxy_pass https://runtime;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Gateway endpoints (management plane) ---

    location /health {
        proxy_pass https://gateway;
        proxy_ssl_verify off;
        access_log off;
    }

    location /metrics {
        deny all;
        return 403;
    }

    location /auth/ {
        proxy_pass https://gateway;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass https://gateway;
        proxy_ssl_verify off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass https://gateway;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 10;
        proxy_send_timeout 600;
        limit_req zone=api burst=20 nodelay;
    }
}

# ============================================================
# monitoring.agents-orchestrator.com -- Grafana
# ============================================================

server {
    listen 80;
    server_name monitoring.agents-orchestrator.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        if (-f /etc/nginx/ssl/live/monitoring.agents-orchestrator.com/fullchain.pem) {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name monitoring.agents-orchestrator.com;

    ssl_certificate     /etc/nginx/ssl/live/monitoring.agents-orchestrator.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/monitoring.agents-orchestrator.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_MON:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana WebSocket (live updates)
    location /api/live/ {
        proxy_pass http://grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
