upstream dashboard {
    server dashboard:5005;
}

# Rate limiting zone — 10 req/s per IP, 10 MB shared memory
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# --- HTTP server (active now, will redirect to HTTPS once SSL is configured) ---
server {
    listen 80;
    server_name _;

    # ACME challenge for Let's Encrypt / certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Dashboard (main app) — proxy to HTTPS backend (self-signed)
    location / {
        proxy_pass https://dashboard;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # WebSocket support
    location /ws {
        proxy_pass https://dashboard;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Auth endpoints (no rate limit — OAuth callbacks need to work)
    location /auth/ {
        proxy_pass https://dashboard;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no auth, no rate limit)
    location /health {
        proxy_pass https://dashboard;
        proxy_ssl_verify off;
        access_log off;
    }

    # Block access to metrics from outside (Prometheus scrapes internally)
    location /metrics {
        deny all;
        return 403;
    }

    # Static files caching
    location /static/ {
        proxy_pass https://dashboard;
        proxy_ssl_verify off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

