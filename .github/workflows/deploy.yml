name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"
      # The Rust CLI ships via cli-release.yml (tag push), not the server image.
      # Redeploying the dashboard on every cli/ commit is wasteful AND restarts
      # the server, dropping active agent-host WS sessions mid-turn.
      - "cli/**"
      - "docker/ago-jail/**"

  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Serialize deploys: if two commits land back-to-back (or workflow_dispatch
# overlaps with a push), queue them instead of running in parallel. Concurrent
# deploys race on shared EC2 state (docker networks, certbot container name)
# and leave the site down when the second one's `up -d` collides with the
# first's mid-flight containers.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_DIR: /opt/agent-orchestrator
  # Opt JS-based actions (actions/cache, actions/upload-artifact, ...)
  # into the Node 24 runtime. Node 20 is deprecated on GitHub runners and
  # will be removed on 2026-09-16. Remove this line once Node 24 is the
  # default (announced for 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          # Full history so the type-check gate can diff against the base
          # commit (github.event.before) to find changed Python files.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,dashboard]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Lint check
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type-check changed files (pyright)
        run: |
          # Incremental gate: a file touched in this push must be type-clean,
          # even though the tree still carries a pre-existing backlog
          # (scripts/typecheck.sh --all). Closes the gap where ruff+pytest
          # pass but a real type error (wrong attribute, BaseException slipping
          # an `except Exception`) only ever surfaced in the editor's Pylance.
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          TYPECHECK_BASE="$BASE" bash scripts/typecheck.sh --changed

      - name: Responsive lint (frontend)
        run: bash scripts/check_responsive.sh

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  deploy:
    name: Deploy to EC2
    needs: [test, frontend-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        env:
          SSH_KEY: ~/.ssh/deploy_key
          HOST: ${{ secrets.EC2_HOST }}
          USER: ec2-user
          AWS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JWT_KEY: ${{ secrets.JWT_SECRET_KEY }}
          OAUTH_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_ALLOWLIST: ${{ secrets.ALLOWED_GOOGLE_EMAILS }}
          GF_SMTP_USER: ${{ secrets.GRAFANA_SMTP_USER }}
          GF_SMTP_PASS: ${{ secrets.GRAFANA_SMTP_PASSWORD }}
          GF_ADMIN_PASS: ${{ secrets.GRAFANA_PASSWORD || 'admin' }}
          PG_PASS: ${{ secrets.POSTGRES_PASSWORD || 'orchestrator-prod-2026' }}
        run: |
          SSH_CMD="ssh -i $SSH_KEY -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=20 $USER@$HOST"

          # Ensure rsync is available on EC2
          $SSH_CMD "which rsync >/dev/null 2>&1 || sudo yum install -y rsync"

          # Ensure at least 4 GB swap is present — docker compose build with
          # React + Rust/maturin + Python can OOM on t3.medium (4 GB RAM).
          # Idempotent: creates /swapfile only if missing.
          $SSH_CMD "
            if ! swapon --show | grep -q /swapfile; then
              echo 'Creating 4 GB swapfile'
              sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            free -h | head -3
          "

          # Sync code (exclude dev files)
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.env*' \
            --exclude='terraform' \
            --exclude='jobs/' \
            --exclude='.ruff_cache' \
            --exclude='certs/' \
            -e "ssh -i $SSH_KEY -o StrictHostKeyChecking=accept-new" \
            . $USER@$HOST:$APP_DIR/

          # Inject all secrets into .env.prod on EC2
          _inject() {
            local key="$1" val="$2"
            $SSH_CMD "cd $APP_DIR && grep -q '^${key}=' .env.prod 2>/dev/null && sed -i 's|^${key}=.*|${key}=${val}|' .env.prod || echo '${key}=${val}' >> .env.prod"
          }
          _inject AWS_ACCESS_KEY_ID "$AWS_KEY_ID"
          _inject AWS_SECRET_ACCESS_KEY "$AWS_SECRET"
          _inject OPENROUTER_API_KEY "$OPENROUTER_KEY"
          _inject JWT_SECRET_KEY "$JWT_KEY"
          _inject OAUTH_CLIENT_ID "$OAUTH_ID"
          _inject OAUTH_CLIENT_SECRET "$OAUTH_SECRET"
          _inject GOOGLE_OAUTH_CLIENT_ID "$GOOGLE_OAUTH_ID"
          _inject GOOGLE_OAUTH_CLIENT_SECRET "$GOOGLE_OAUTH_SECRET"
          _inject ALLOWED_GOOGLE_EMAILS "$GOOGLE_ALLOWLIST"
          _inject GRAFANA_SMTP_USER "$GF_SMTP_USER"
          _inject GRAFANA_SMTP_PASSWORD "$GF_SMTP_PASS"
          _inject GRAFANA_PASSWORD "$GF_ADMIN_PASS"
          _inject POSTGRES_PASSWORD "$PG_PASS"
          _inject BASE_URL "https://agents-orchestrator.com"
          _inject GITHUB_USERNAME "pjcau"
          _inject SANDBOX_ENABLED "true"
          _inject SANDBOX_TYPE "docker"
          _inject SANDBOX_IMAGE "python:3.12-slim"
          _inject SANDBOX_MAX_CONCURRENT "10"

          # Ensure Docker buildx >= 0.17.0 (required by compose build).
          # AL2023 doesn't ship docker-buildx-plugin in its repos, so pull the
          # binary from GitHub releases. Idempotent: re-installs only if missing
          # or older than 0.17.
          $SSH_CMD "
            NEED_INSTALL=true
            if docker buildx version 2>/dev/null | grep -qE 'v0\.(1[7-9]|[2-9][0-9])\.|v[1-9]'; then
              NEED_INSTALL=false
            fi
            if [ \"\$NEED_INSTALL\" = true ]; then
              echo 'Installing docker buildx v0.18.0'
              mkdir -p \$HOME/.docker/cli-plugins
              curl -fsSL -o \$HOME/.docker/cli-plugins/docker-buildx \
                https://github.com/docker/buildx/releases/download/v0.18.0/buildx-v0.18.0.linux-amd64
              chmod +x \$HOME/.docker/cli-plugins/docker-buildx
            fi
            docker buildx version
          "

          # --- SSL certs ---
          # Certs persist on disk at $APP_DIR/certs/ across deploys.
          # Self-signed is ONLY generated on first-ever deploy (no cert exists).
          # The certbot container renews LE certs automatically every 12h.
          # Deploy only requests LE if current cert is self-signed or expiring.
          # IMPORTANT: never write through symlinks — would destroy LE archive certs.
          $SSH_CMD "
            for DOMAIN in agents-orchestrator.com monitoring.agents-orchestrator.com; do
              CERT_DIR=$APP_DIR/certs/live/\$DOMAIN
              # Use sudo: after a successful LE issuance, fullchain.pem
              # symlinks into archive/ (root-only). Without sudo, openssl
              # fails with permission-denied and we'd wipe the real LE cert
              # with a fresh self-signed bootstrap on every deploy.
              if sudo test -f \$CERT_DIR/fullchain.pem && sudo openssl x509 -in \$CERT_DIR/fullchain.pem -checkend 0 -noout 2>/dev/null; then
                echo \"Valid cert exists for \$DOMAIN — not touching it\"
              else
                echo \"No valid cert for \$DOMAIN — generating self-signed bootstrap cert\"
                sudo mkdir -p \$CERT_DIR
                TMPDIR=\$(mktemp -d)
                sudo openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                  -keyout \$TMPDIR/privkey.pem \
                  -out \$TMPDIR/fullchain.pem \
                  -subj \"/CN=\$DOMAIN\" 2>/dev/null
                sudo rm -f \$CERT_DIR/fullchain.pem \$CERT_DIR/privkey.pem
                sudo cp \$TMPDIR/fullchain.pem \$CERT_DIR/fullchain.pem
                sudo cp \$TMPDIR/privkey.pem \$CERT_DIR/privkey.pem
                rm -rf \$TMPDIR
              fi
            done
          "

          # Pre-clean: remove any stale agent-orchestrator containers left over
          # from a previously interrupted deploy (e.g. OOM freeze). Must run
          # BEFORE build/down because such containers are not always visible to
          # docker compose if the previous compose session left inconsistent
          # state. Safe no-op when there are none.
          $SSH_CMD "docker ps -aq --filter 'name=agent-orchestrator' | xargs -r docker rm -f" || true

          # --- Disk hygiene before build ---
          # `docker compose build --no-cache` accumulates intermediate
          # BuildKit layers every run (frontend node_modules, rust toolchain,
          # apt/pip caches). On a busy day with multiple failed retries the
          # 100 GB EC2 volume can fill in days, breaking the rust-build stage
          # with "no free space in /var/cache/apt/archives".
          #
          # Strategy (no impact on running services, no feature loss):
          #   1. Prune dangling images + build cache older than 24h. Keeps
          #      yesterday's cache for fast retry-after-fix, but caps the
          #      rolling footprint at ~one day of builds.
          #   2. Bail early with a clear error if free space < 5 GB, so we
          #      never start a build that's doomed to fail mid-way.
          # Volumes (postgres, grafana, certs) and active container images
          # are explicitly NOT touched.
          $SSH_CMD "
            echo '=== disk before prune ==='
            df -h / | head -3
            docker container prune -f --filter 'until=24h' >/dev/null 2>&1 || true
            docker image prune -af --filter 'until=24h' >/dev/null 2>&1 || true
            docker builder prune -af --filter 'until=24h' >/dev/null 2>&1 || true
            echo '=== disk after prune ==='
            df -h / | head -3
            AVAIL_GB=\$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
            if [ \"\${AVAIL_GB:-0}\" -lt 5 ]; then
              echo \"FATAL: only \${AVAIL_GB} GB free on EC2 root — build needs >=5 GB.\"
              echo \"Run: docker builder prune -af  (drops all cache, slower next build)\"
              exit 1
            fi
          "

          # Build and restart services
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod build --no-cache dashboard aws-cost-exporter"
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod down --remove-orphans --timeout 30" || true
          # Second sweep after compose down — catches anything compose missed.
          $SSH_CMD "docker ps -aq --filter 'name=agent-orchestrator' | xargs -r docker rm -f" || true
          # Retry `compose up -d` up to 3× with backoff: Docker Hub and
          # GHCR sometimes throttle anonymous pulls (`toomanyrequests`)
          # and a single 503-style failure used to fail the whole deploy.
          # Retries are cheap because already-pulled layers are skipped.
          for attempt in 1 2 3; do
            if $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod up -d"; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "::error::compose up -d failed 3× — bailing"
              exit 1
            fi
            echo "::warning::compose up -d failed (attempt $attempt/3) — retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done

          # Install/refresh the boot-time auto-recovery unit on the CURRENT
          # instance. This is a spot instance — when AWS reclaims it
          # (interruption_behavior=stop) and the persistent request restarts
          # it, this oneshot brings the whole stack back with no manual
          # redeploy. The unit file is versioned in the repo (rsynced to
          # $APP_DIR), so this just copies it into place. Idempotent.
          $SSH_CMD "sudo cp $APP_DIR/docker/systemd/agent-orchestrator.service /etc/systemd/system/agent-orchestrator.service && sudo systemctl daemon-reload && sudo systemctl enable agent-orchestrator.service"

          # Ensure postgres password matches .env.prod (fixes first-init mismatch)
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml exec -T postgres psql -U orchestrator -c \"ALTER USER orchestrator WITH PASSWORD '${PG_PASS}';\"" 2>/dev/null || true

          # Restart dashboard to pick up DB connection after password sync
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod restart dashboard"

          # --- LE cert provisioning (only if current cert is self-signed or expiring soon) ---
          # The certbot renewal container handles routine renewal. This step only runs
          # on first deploy (to replace the bootstrap self-signed) or if cert is near expiry.
          $SSH_CMD "
            for DOMAIN in agents-orchestrator.com monitoring.agents-orchestrator.com; do
              LE_DIR=$APP_DIR/certs/live/\$DOMAIN
              # Use sudo — LE fullchain.pem symlinks into root-only archive/;
              # plain openssl as ec2-user would fail and we'd misclassify every
              # valid LE cert as self-signed/expiring, re-running certbot and
              # burning rate-limit budget on every deploy.
              ISSUER=\$(sudo openssl x509 -in \$LE_DIR/fullchain.pem -issuer -noout 2>/dev/null || echo '')
              IS_SELF_SIGNED=false
              echo \"\$ISSUER\" | grep -qiE \"CN\\s*=\\s*\$DOMAIN\" && IS_SELF_SIGNED=true
              EXPIRING_SOON=false
              sudo openssl x509 -in \$LE_DIR/fullchain.pem -checkend 2592000 -noout 2>/dev/null || EXPIRING_SOON=true

              if [ \"\$IS_SELF_SIGNED\" = true ] || [ \"\$EXPIRING_SOON\" = true ]; then
                echo \"Requesting Let's Encrypt cert for \$DOMAIN (self_signed=\$IS_SELF_SIGNED, expiring_soon=\$EXPIRING_SOON)\"
                # If certbot previously emitted a lineage with a numeric suffix
                # (agents-orchestrator.com-0001), nginx may still be serving the
                # self-signed at the base path. Adopt the newest valid LE lineage
                # if one exists, so we don't blow away a cert we already paid the
                # rate-limit cost to issue.
                ADOPTED=false
                # Use sudo for openssl — the cert lives behind root-only archive/,
                # and ec2-user's plain openssl would report 'permission denied'
                # on a perfectly valid LE cert, making adoption impossible.
                for CAND in \$(sudo ls -1d $APP_DIR/certs/live/\${DOMAIN}-* 2>/dev/null | sort -r); do
                  if sudo openssl x509 -in \$CAND/fullchain.pem -checkend 2592000 -noout 2>/dev/null; then
                    CAND_ISSUER=\$(sudo openssl x509 -in \$CAND/fullchain.pem -issuer -noout 2>/dev/null)
                    if ! echo \"\$CAND_ISSUER\" | grep -qiE \"CN\\s*=\\s*\$DOMAIN\"; then
                      echo \"Adopting existing LE lineage \$CAND into \$DOMAIN\"
                      sudo rm -rf $APP_DIR/certs/live/\$DOMAIN
                      sudo cp -rL \$CAND $APP_DIR/certs/live/\$DOMAIN
                      sudo chmod -R a+rX $APP_DIR/certs/live/\$DOMAIN
                      ADOPTED=true
                      break
                    fi
                  fi
                done
                if [ \"\$ADOPTED\" = false ] && [ \"\$IS_SELF_SIGNED\" = true ]; then
                  # No valid LE lineage available and current cert is self-signed:
                  # wipe everything related to this domain so certbot can issue
                  # into the canonical \$DOMAIN lineage without numeric suffixes.
                  # IMPORTANT: the glob must be expanded inside the sudo shell,
                  # otherwise ec2-user's shell cannot list archive/ (drwx------)
                  # and passes the literal string to rm, which silently matches
                  # nothing. Use sudo sh -c so globbing happens as root.
                  sudo sh -c \"rm -rf $APP_DIR/certs/live/\${DOMAIN}* \
                                       $APP_DIR/certs/archive/\${DOMAIN}* \
                                       $APP_DIR/certs/renewal/\${DOMAIN}*.conf\"
                fi
                if [ \"\$ADOPTED\" = false ]; then
                  # Try Let's Encrypt first (most browsers already trust it).
                  LE_OK=false
                  if (cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod \
                        run --rm --entrypoint certbot certbot \
                        certonly --webroot -w /var/www/certbot \
                        --cert-name \$DOMAIN \
                        --email admin@\$DOMAIN \
                        --agree-tos --no-eff-email \
                        -d \$DOMAIN \
                        --non-interactive \
                        --keep-until-expiring 2>&1); then
                    LE_OK=true
                  fi
                  # If LE is rate-limited or otherwise unavailable, fall back to
                  # Buypass Go SSL — free ACME CA with an independent rate limit
                  # (20 certs / domain / week). This keeps the site valid while
                  # LE recovers.
                  if [ \"\$LE_OK\" = false ]; then
                    echo \"Let's Encrypt failed for \$DOMAIN — falling back to Buypass Go SSL\"
                    cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod \
                      run --rm --entrypoint certbot certbot \
                      certonly --webroot -w /var/www/certbot \
                      --server https://api.buypass.com/acme/directory \
                      --cert-name \$DOMAIN \
                      --email admin@\$DOMAIN \
                      --agree-tos --no-eff-email \
                      -d \$DOMAIN \
                      --non-interactive \
                      --keep-until-expiring 2>&1 || echo \"Buypass failed for \$DOMAIN (non-fatal, keeping existing cert)\"
                  fi
                fi
                # Re-create the self-signed bootstrap if certbot failed (avoids
                # nginx failing to start because cert files went missing).
                # Use sudo test because the live/archive dirs are root-only and
                # a plain `[ -f ]` would always report false for ec2-user,
                # destroying the cert certbot just issued.
                if ! sudo test -f $APP_DIR/certs/live/\$DOMAIN/fullchain.pem; then
                  echo \"LE issuance failed — restoring self-signed bootstrap for \$DOMAIN\"
                  sudo mkdir -p $APP_DIR/certs/live/\$DOMAIN
                  TMP2=\$(mktemp -d)
                  sudo openssl req -x509 -nodes -days 90 -newkey rsa:2048 \
                    -keyout \$TMP2/privkey.pem -out \$TMP2/fullchain.pem \
                    -subj \"/CN=\$DOMAIN\" 2>/dev/null
                  sudo cp \$TMP2/fullchain.pem $APP_DIR/certs/live/\$DOMAIN/fullchain.pem
                  sudo cp \$TMP2/privkey.pem $APP_DIR/certs/live/\$DOMAIN/privkey.pem
                  rm -rf \$TMP2
                fi
              else
                echo \"Valid LE cert for \$DOMAIN — skipping certbot\"
              fi
            done
          "

          # Restart nginx to pick up new certs and dashboard container IP (avoids 502)
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod restart nginx"

      - name: Health Check
        env:
          SSH_KEY: ~/.ssh/deploy_key
          HOST: ${{ secrets.EC2_HOST }}
          USER: ec2-user
        run: |
          SSH_CMD="ssh -i $SSH_KEY -o StrictHostKeyChecking=accept-new $USER@$HOST"
          echo "Waiting for service to start..."
          sleep 15

          # Check dashboard container health via Docker inspect (dashboard runs HTTPS internally)
          for i in $(seq 1 8); do
            HEALTH=$($SSH_CMD "docker inspect --format='{{.State.Health.Status}}' \$(docker ps -q --filter name=dashboard | head -1) 2>/dev/null" 2>/dev/null) || HEALTH="unknown"
            HEALTH=$(echo "$HEALTH" | tr -d '[:space:]')
            if [ "$HEALTH" = "healthy" ]; then
              echo "Dashboard health check passed (attempt $i)"
              # Also verify nginx is running
              $SSH_CMD "docker ps --format '{{.Names}} {{.Status}}' | grep nginx" || echo "WARNING: nginx not healthy"
              exit 0
            fi
            echo "Attempt $i: dashboard health=$HEALTH, retrying in 10s..."
            sleep 10
          done

          # Diagnostics on failure
          echo "=== Container status ==="
          $SSH_CMD "docker ps -a --format 'table {{.Names}}\t{{.Status}}'" || true
          echo "=== Dashboard logs ==="
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail 20 dashboard" || true
          echo "=== Nginx logs ==="
          $SSH_CMD "cd $APP_DIR && docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail 10 nginx" || true

          echo "Health check failed after 8 attempts"
          exit 1

      - name: Public HTTPS probe
        run: |
          # Verify the service is reachable from the public internet, not just
          # healthy inside the box. Catches nginx/cert/DNS issues that the
          # internal docker inspect health check misses.
          #
          # Untrusted-cert policy: the probe FAILS when the strict TLS handshake
          # fails but the insecure handshake succeeds. That combination means
          # the site is up but serving a cert browsers reject (self-signed or
          # other CA chain issue) — users see ERR_CERT_AUTHORITY_INVALID. An
          # earlier version of this probe treated that case as DEGRADED and
          # exited 0, which masked a self-signed fallback being shipped to
          # production.
          DOMAIN="agents-orchestrator.com"
          OK_CODES='^(200|301|302|401|403)$'
          # '|| echo 000' is required: bash -e (GitHub default) aborts the
          # script on any non-zero exit, so an SSL/connect failure from curl
          # would kill the job before the insecure retry ever runs.
          for i in $(seq 1 6); do
            CODE=$(curl -sSI --max-time 10 "https://$DOMAIN/" -o /dev/null -w "%{http_code}" || echo 000)
            if echo "$CODE" | grep -qE "$OK_CODES"; then
              echo "Public probe OK: HTTP $CODE on attempt $i"
              exit 0
            fi
            INSECURE=$(curl -skSI --max-time 10 "https://$DOMAIN/" -o /dev/null -w "%{http_code}" || echo 000)
            if echo "$INSECURE" | grep -qE "$OK_CODES"; then
              ISSUER=$(echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null \
                       | openssl x509 -noout -issuer 2>/dev/null || echo "")
              echo "Public probe FAILED: HTTP $INSECURE with untrusted cert for $DOMAIN"
              echo "Served cert issuer: $ISSUER"
              if echo "$ISSUER" | grep -qiE "CN\s*=\s*$DOMAIN"; then
                echo "Self-signed certificate detected — browsers show ERR_CERT_AUTHORITY_INVALID."
              else
                echo "Certificate not trusted by the default CA bundle."
              fi
              exit 1
            fi
            echo "Attempt $i: strict HTTP $CODE, insecure HTTP $INSECURE — retrying in 10s..."
            sleep 10
          done
          echo "Public HTTPS probe failed for $DOMAIN (no valid response after 6 attempts)"
          exit 1

      - name: Open issue on deploy failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[deploy] Production deploy failed (run ${context.runId})`;
            const body = [
              `Deploy workflow failed on commit ${context.sha}.`,
              ``,
              `Run: ${runUrl}`,
              `Branch: ${context.ref}`,
              ``,
              `This issue was opened automatically by the Deploy workflow.`,
              `Close it once the deploy is back to green.`,
            ].join('\n');

            // Avoid issue spam: reuse an open deploy-failure issue if one exists.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 5,
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Commented on existing issue #${existing[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['deploy-failure', 'automated', 'needs-triage'],
              });
              core.info(`Opened issue #${issue.number}`);
            }
