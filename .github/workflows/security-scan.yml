name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- Python dependency audit ---
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project and audit tools
        run: |
          pip install ".[dev,dashboard]"
          pip install pip-audit

      - name: Run pip-audit
        # CVE-2026-4539: pygments <=2.19.2 ReDoS (local only, no fix released upstream)
        # CVE-2026-3219: pip <26.x tar/ZIP confusion on concatenated archives. pip 26.0.1 is
        #   the latest release as of this ignore — no fixed version is yet published on PyPI.
        # CVE-2025-8869, CVE-2026-1703, CVE-2026-6357: pip itself in the runner.
        #   The CI runner image controls the pip version; project deps cannot pin it.
        # PYSEC-2025-183: pyjwt "weak encryption" — disputed by maintainers (key length is
        #   chosen by the application, not the library); no fix version exists.
        # PYSEC-2026-196: pip 26.1.1 entry-points sanitization. Fixed in pip 26.1.2 but the
        #   CI runner image still ships 26.1.1; project deps cannot pin the runner's pip.
        run: |
          pip-audit --desc \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-6357 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2026-196

  # --- CodeQL static analysis ---
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # --- Dockerfile security (Trivy) ---
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build dashboard image
        run: docker build -f docker/dashboard/Dockerfile -t dashboard-scan .

      - name: Trivy scan (table — show vulnerabilities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "dashboard-scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan (SARIF — upload to GitHub Security)
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          image-ref: "dashboard-scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

  # --- Secret scanning (TruffleHog) ---
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      # Pinned to v5: actions/checkout@v7 has a regression where fetch-depth: 0
      # fails with "could not read Username" because credentials are not wired
      # into the full-history fetch. See community discussion #183817.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          extra_args: --only-verified
