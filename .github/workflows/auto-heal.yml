# Auto-heal — daily sweep that fixes the most common pipeline failures.
#
# Runs every night at 04:00 UTC (one hour after `ec2-disk-cleanup`), scans
# the workflow runs of the last 24 hours, classifies failures against a
# small catalogue of well-known patterns, applies the corresponding fix,
# and opens a single PR with the result. Patterns that don't match are
# surfaced as a GitHub issue so a human can pick them up.
#
# Why a PR and not a direct push to main?
# - Auto-fixers are best-effort; a PR keeps a reviewer in the loop and a
#   bisectable revert if a fix lands wrong.
# - The branch lives at `auto-heal/YYYY-MM-DD`, so two runs in the same
#   day idempotently update the same branch (no PR proliferation).
#
# Patterns covered today:
# - `ruff format --check` drift  → `ruff format`           (Python)
# - `ruff check` drift           → `ruff check --fix`      (Python)
# - `cargo fmt --check` drift    → `cargo fmt`             (Rust)
# - `cargo clippy` lint drift    → `cargo clippy --fix`    (Rust, safe)
# - `Cargo.lock` out of sync     → `cargo update -p ago`   (Rust)
# - pip-audit new CVE            → open tracking issue
# - CodeQL open code-scanning    → open tracking issue per (rule, file, line)
# - EC2 disk full (Deploy fail)  → trigger `ec2-disk-cleanup` workflow
#
# Patterns NOT covered (deliberately — too risky for unattended fix):
# - test failures, compile errors, anything that needs code understanding.
#
# Cost: ~3 min of runner time on a healthy day (no failures), ~6 min on
# a day with multiple fixes (one matrix step per pattern).

name: Auto-heal Pipelines & Security

on:
  schedule:
    # 04:00 UTC daily, paced after `ec2-disk-cleanup` at 03:00 so the
    # latter has a chance to fix EC2 before we look at "Deploy failed".
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      window_hours:
        description: "How many hours back to scan for failed runs (default 24)."
        type: string
        default: "24"
      open_issue_on_unknown:
        description: "Open a GitHub issue when a failure does not match any known pattern."
        type: boolean
        default: true

concurrency:
  group: auto-heal
  cancel-in-progress: false

permissions:
  contents: write       # branch + commit on the auto-heal branch
  pull-requests: write  # create/update the PR
  actions: write        # trigger ec2-disk-cleanup as a downstream
  issues: write         # open ops issue when nothing matches
  security-events: read # read code-scanning/secret-scanning alerts

jobs:
  heal:
    name: Sweep + fix
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute daily branch
        id: branch
        run: |
          BR="auto-heal/$(date -u +%Y-%m-%d)"
          echo "name=$BR" >> "$GITHUB_OUTPUT"
          echo "Auto-heal branch: $BR"

      - name: Ensure branch exists (idempotent across same-day reruns)
        env:
          BR: ${{ steps.branch.outputs.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "agent-orchestrator-bot"
          git config user.email "bot@agents-orchestrator.com"
          # Track existing remote branch if present, else fork from main.
          if git ls-remote --exit-code --heads origin "$BR" >/dev/null; then
            git fetch origin "$BR":"$BR"
            git checkout "$BR"
            git merge --no-edit origin/main || true
          else
            git checkout -b "$BR"
          fi

      # --- Scan failures of the last N hours --------------------------------

      - name: Scan recent failed runs
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '24' }}
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${WINDOW_HOURS} hours ago" +%FT%TZ)
          echo "Scanning failures since $cutoff"
          gh run list --branch main --status failure --limit 50 \
            --json databaseId,name,workflowName,conclusion,createdAt,headSha \
            > /tmp/runs.json
          jq --arg cut "$cutoff" '[.[] | select(.createdAt >= $cut)]' \
            /tmp/runs.json > /tmp/recent.json
          echo "Recent failures:"
          jq -r '.[] | "\(.workflowName) — \(.name) [\(.databaseId)]"' /tmp/recent.json
          # Build a set of failed workflow file names for downstream matching.
          jq -r '[.[].workflowName] | unique[]' /tmp/recent.json > /tmp/failed_workflows.txt
          wc -l /tmp/failed_workflows.txt

      # --- Pattern: EC2 disk full → trigger cleanup -------------------------

      - name: If a recent Deploy failed, kick ec2-disk-cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if grep -qx "Deploy" /tmp/failed_workflows.txt; then
            echo "Deploy failed in window — triggering ec2-disk-cleanup"
            gh workflow run ec2-disk-cleanup.yml --ref main \
              -f aggressive=true -f redeploy=true || true
          else
            echo "Deploy is healthy — skipping disk cleanup."
          fi

      # --- Pattern: Python lint / format drift ------------------------------

      - name: Set up Python (for ruff)
        if: hashFiles('pyproject.toml') != ''
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: ruff format + check --fix
        if: hashFiles('pyproject.toml') != ''
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "ruff>=0.6"
          # Idempotent: format applies in place; check --fix only the safe lints.
          ruff format src/ tests/ || true
          ruff check src/ tests/ --fix --exit-zero || true
          ruff format --check src/ tests/ || true
          echo "ruff sweep done."

      # --- Pattern: Rust fmt / clippy / Cargo.lock --------------------------

      - name: Set up Rust (stable)
        if: hashFiles('cli/Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt + clippy --fix + lock update
        if: hashFiles('cli/Cargo.toml') != ''
        working-directory: cli
        run: |
          set -euo pipefail
          cargo fmt --all || true
          # `--fix` only applies machine-applicable suggestions; we keep the
          # default deny-warnings policy off here so the workflow itself
          # never fails on a borderline lint.
          cargo clippy --fix --allow-dirty --allow-staged --all-targets || true
          # Regenerate Cargo.lock against the current Cargo.toml. `--workspace`
          # ensures every member resolves cleanly; downgrades nothing on its
          # own (we only call `update -p ago` to avoid bumping unrelated
          # transitive deps).
          cargo update -p ago || true
          cargo fmt --check --all
          echo "Rust sweep done."

      # --- Pattern: code-scanning alerts (CodeQL) → tracking issues --------
      #
      # GitHub's code scanning surfaces CodeQL findings (and any other
      # SARIF uploader's) under /security/code-scanning. Auto-fixing the
      # underlying code is too risky — these are real security
      # weaknesses where context matters. Instead the auto-heal opens
      # one tracking issue per (rule_id, file, line) so they are visible
      # in the normal Issues feed; deduplication keeps repeat runs idempotent.

      - name: Sweep open code-scanning alerts → tracking issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          alerts=$(gh api -X GET \
            repos/${{ github.repository }}/code-scanning/alerts \
            -F state=open --paginate 2>/dev/null || echo '[]')
          count=$(echo "$alerts" | jq 'length')
          echo "Open code-scanning alerts: $count"
          if [ "$count" = "0" ]; then
            exit 0
          fi
          # Build a flat list of dicts for the issue creation loop.
          echo "$alerts" | jq -c '.[] | {
            number, html_url,
            severity: (.rule.severity // "warning"),
            sec_sev:  (.rule.security_severity_level // "n/a"),
            rule_id:  (.rule.id // .rule.name // "unknown"),
            description: (.rule.description // ""),
            file:     (.most_recent_instance.location.path // ""),
            line:     (.most_recent_instance.location.start_line // 0)
          }' > /tmp/alerts.jsonl
          while read -r a; do
            rule=$(echo "$a" | jq -r '.rule_id')
            file=$(echo "$a" | jq -r '.file')
            line=$(echo "$a" | jq -r '.line')
            sev=$(echo "$a"  | jq -r '.severity')
            sec=$(echo "$a"  | jq -r '.sec_sev')
            url=$(echo "$a"  | jq -r '.html_url')
            desc=$(echo "$a" | jq -r '.description')
            title="code-scanning: ${rule} in ${file}:${line}"
            # Dedup by exact title — repeat runs update body instead of
            # creating duplicate issues.
            existing=$(gh issue list --state open --label code-scanning \
              --search "$title in:title" --json number -q '.[0].number' || true)
            body=$(printf '%s\n\n- **Rule:** \`%s\`\n- **Severity:** %s / %s\n- **Location:** [%s:%s](%s)\n\n%s\n\n_Tracked by [auto-heal](.github/workflows/auto-heal.yml). Close manually once fixed; CodeQL closes the upstream alert automatically when the next scan sees the issue resolved._\n' \
              "Open code-scanning alert auto-tracked from /security/code-scanning." \
              "$rule" "$sev" "$sec" "$file" "$line" "$url" "$desc")
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --body "$body" || true
              echo "  updated #$existing — $title"
            else
              gh issue create \
                --title "$title" \
                --body "$body" \
                --label "auto-heal,code-scanning,${sec}" 2>/dev/null \
                || gh issue create --title "$title" --body "$body" --label "auto-heal,code-scanning" \
                || true
              echo "  opened — $title"
            fi
          done < /tmp/alerts.jsonl

      # --- Pattern: pip-audit new CVE → open issue (cannot modify yml) ------
      #
      # We deliberately do NOT auto-edit `.github/workflows/security-scan.yml`
      # here: the default `GITHUB_TOKEN` is forbidden by GitHub from
      # writing to `.github/workflows/*` for safety. So we collect the new
      # advisory IDs and open a tracked issue; a human applies the ignore
      # in a normal PR. Keeps the human-in-the-loop for security calls.

      - name: pip-audit new advisories → issue
        if: hashFiles('.github/workflows/security-scan.yml') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          fail=$(gh run list --workflow="Security Scan" --status failure --limit 1 \
            --json databaseId -q '.[0].databaseId' || true)
          if [ -z "$fail" ]; then
            echo "No recent Security Scan failure; nothing to groom."
            exit 0
          fi
          log=$(mktemp)
          gh run view "$fail" --log >"$log" 2>/dev/null || true
          # Filter out CodeQL paths first — CodeQL ships query files
          # named after CVE IDs (e.g. python-queries/Security/CVE-2018-1281/...)
          # that the regex would otherwise capture as a fake advisory.
          grep -v -E '/python-queries/|/java-queries/|/javascript-queries/|\.qlx?|\.bqrs' "$log" \
            > "$log.cleaned"
          mapfile -t ids < <(grep -oE 'PYSEC-[0-9]+-[0-9]+|CVE-[0-9]{4}-[0-9]+' "$log.cleaned" | sort -u)
          if [ ${#ids[@]} -eq 0 ]; then
            echo "Security Scan failed but no advisory IDs found in log."
            exit 0
          fi
          file=.github/workflows/security-scan.yml
          new=()
          for id in "${ids[@]}"; do
            if ! grep -q -- "--ignore-vuln $id" "$file"; then
              new+=("$id")
            fi
          done
          if [ ${#new[@]} -eq 0 ]; then
            echo "All advisory IDs already in the ignore list."
            exit 0
          fi
          title="auto-heal: pip-audit reports ${#new[@]} unhandled advisory(s)"
          body="$(printf '%s\n\n%s\n\n%s\n' \
            'pip-audit failed and Security Scan reported the following advisory IDs that are NOT in the ignore list yet:' \
            "$(printf -- '- %s\n' "${new[@]}")" \
            "Apply the same `--ignore-vuln <ID>` pattern as in [.github/workflows/security-scan.yml](../blob/main/.github/workflows/security-scan.yml). Open a normal PR (the auto-heal bot cannot edit workflow YAML — GitHub blocks workflow writes for the default token).")"
          # Don't open a duplicate issue if one already exists for the day.
          existing=$(gh issue list --state open --label auto-heal --search "$title" --json number -q '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body" || true
          else
            gh issue create --title "$title" --body "$body" --label "auto-heal,security" || true
          fi

      # --- Commit, push, open PR --------------------------------------------

      - name: Stage + commit (if anything changed)
        id: commit
        run: |
          set -euo pipefail
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Working tree clean — nothing to fix."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(auto-heal): nightly fix sweep $ts

          Pattern-based auto-fixes applied by .github/workflows/auto-heal.yml:
          - ruff format / ruff check --fix (Python)
          - cargo fmt / clippy --fix / Cargo.lock refresh (Rust)
          - pip-audit ignore-list grooming
          - ec2-disk-cleanup dispatched if Deploy failed in the last 24h

          See the PR description for the actual diff and failure list.

          Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"

      - name: Push branch
        if: steps.commit.outputs.changed == 'true'
        env:
          BR: ${{ steps.branch.outputs.name }}
        run: |
          git push -u origin "$BR" --force-with-lease

      - name: Open / update PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BR: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          recent_table=$(jq -r '
            ["| Workflow | Run | Conclusion |", "|---|---|---|"] +
            [.[] | "| \(.workflowName) | [\(.databaseId)](https://github.com/${{ github.repository }}/actions/runs/\(.databaseId)) | \(.conclusion) |"]
            | .[]' /tmp/recent.json)
          body=$(printf '%s\n\n%s\n\n%s\n\n%s\n' \
            "## Auto-heal sweep — $(date -u +%Y-%m-%d)" \
            "Generated by [.github/workflows/auto-heal.yml](.github/workflows/auto-heal.yml) on ${BR}." \
            "### Failures observed in the window" \
            "$recent_table")
          if gh pr view "$BR" --json url >/dev/null 2>&1; then
            gh pr edit "$BR" --body "$body"
            echo "Updated existing PR for $BR"
          else
            gh pr create --base main --head "$BR" \
              --title "auto-heal: nightly pipeline + security sweep" \
              --body "$body" \
              --label "auto-heal,ci"
          fi

      - name: Open ops issue when nothing healed
        if: |
          steps.commit.outputs.changed != 'true'
          && (github.event.inputs.open_issue_on_unknown != 'false')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          count=$(jq 'length' /tmp/recent.json)
          if [ "$count" -eq 0 ]; then
            echo "No failures in window — not opening an issue."
            exit 0
          fi
          body=$(jq -r '
            ["The nightly auto-heal sweep saw the following failures but had no matching fix to apply.",
             "",
             "| Workflow | Run | Conclusion |",
             "|---|---|---|"] +
            [.[] | "| \(.workflowName) | [\(.databaseId)](https://github.com/${{ github.repository }}/actions/runs/\(.databaseId)) | \(.conclusion) |"]
            | .[]' /tmp/recent.json)
          gh issue create \
            --title "auto-heal: unmatched failures on $(date -u +%Y-%m-%d)" \
            --body "$body" \
            --label "auto-heal,ops" || true
