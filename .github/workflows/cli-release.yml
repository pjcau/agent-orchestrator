name: cli-release

# Triggered on:
#   - v* tag pushes  → produce a real GitHub Release with prebuilt
#     binaries for the 5-target matrix.
#   - manual dispatch → useful for verifying the cross-compile matrix
#     without cutting a release. Manual runs upload the artifacts to the
#     workflow run but do NOT create a GitHub Release.
#
# Targets shipped for v0.1.0:
#   * aarch64-apple-darwin       (macOS, Apple Silicon)
#   * x86_64-apple-darwin        (macOS, Intel)
#   * x86_64-unknown-linux-musl  (Linux, static)
#   * aarch64-unknown-linux-musl (Linux ARM, static)
#   * x86_64-pc-windows-msvc     (Windows)

on:
  push:
    tags:
      # Tag pattern is namespaced (`ago-v...`) because this repository
      # already uses `v*` for orchestrator-wide releases. Keeping the
      # CLI tagging distinct prevents accidental release-job triggers
      # when the orchestrator is tagged, and vice-versa.
      - "ago-v*"
  workflow_dispatch:

permissions:
  contents: write   # required by softprops/action-gh-release
  id-token: write   # required by sigstore/cosign-installer for keyless OIDC signing

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            # macos-latest is arm64 (M-series). Rust cross-compiles
            # x86_64-apple-darwin natively from arm64 macOS with no extra
            # toolchain, and the arm64 runner pool is far less queued
            # than the dwindling Intel-mac runner pool. The produced
            # binary still runs on Intel Macs.
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            apt-packages: musl-tools
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            use-cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - name: Compute release name
        shell: bash
        run: |
          # The tag pattern is `ago-v...` so ref_name is already a
          # filename-safe release name (e.g. `ago-v0.1.0`). On manual
          # dispatch from a branch the ref_name may contain `/` — replace
          # with `-` so tar/zip paths stay valid.
          echo "RELEASE_NAME=${GITHUB_REF_NAME//\//-}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Install apt packages
        if: matrix.apt-packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt-packages }}

      - name: Install cross (for ${{ matrix.target }})
        if: matrix.use-cross
        run: cargo install cross --locked --git https://github.com/cross-rs/cross --rev v0.2.5

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        working-directory: cli
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use-cross
        working-directory: cli
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage release artifact (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euxo pipefail
          name="${RELEASE_NAME}-${{ matrix.target }}"
          staging="${RUNNER_TEMP}/${name}"
          mkdir -p "${staging}"
          cp "cli/target/${{ matrix.target }}/release/ago" "${staging}/ago"
          cp cli/README.md docs/cli.md "${staging}/"
          # SHA256 of the binary itself, computed before tar-ing.
          ( cd "${staging}" && sha256sum ago > ago.sha256 )
          tar -C "${RUNNER_TEMP}" -czf "${name}.tar.gz" "${name}"
          echo "ARTIFACT=${name}.tar.gz" >> "${GITHUB_ENV}"
          echo "ARTIFACT_NAME=${name}" >> "${GITHUB_ENV}"

      - name: Stage release artifact (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "$env:RELEASE_NAME-${{ matrix.target }}"
          $staging = Join-Path $env:RUNNER_TEMP $name
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "cli/target/${{ matrix.target }}/release/ago.exe" -Destination "$staging/ago.exe"
          Copy-Item "cli/README.md", "docs/cli.md" -Destination $staging
          Get-FileHash "$staging/ago.exe" -Algorithm SHA256 | Format-Table -HideTableHeaders Hash, Path > "$staging/ago.exe.sha256"
          Compress-Archive -Path $staging -DestinationPath "$name.zip"
          Add-Content $env:GITHUB_ENV "ARTIFACT=$name.zip"
          Add-Content $env:GITHUB_ENV "ARTIFACT_NAME=$name"

      # SBOM generation: a CycloneDX JSON document listing every transitive
      # dependency. Uses syft (fast, native binary) so we don't pay the cost
      # of a second cargo invocation. The SBOM is per-target because the
      # dependency closure can differ slightly across cross-compile targets
      # (e.g. macOS-only keyring backends).
      # Both syft (SBOM) and cosign (signing) are fetched from github.com
      # release assets, which return transient HTTP 504s during GitHub CDN
      # incidents. The stock `anchore/sbom-action` / `sigstore/cosign-installer`
      # actions do NOT retry — a single 504 fails the whole matrix job, and a
      # 5-target × 2-download fan-out turns that into a coupon-collector
      # lottery where `--failed` re-runs never converge. We install both tools
      # ourselves wrapped in `nick-fields/retry`, so a transient 504 retries
      # in-step instead of sinking the release. Same "retry to survive
      # transient infra" pattern already used for the EC2 deploy.
      - name: Generate SBOM (syft, retried)
        # Best-effort: retry covers brief GitHub-CDN blips; continue-on-error
        # keeps a SUSTAINED github.com/releases outage (504s past all retries)
        # from blocking the actual binary release. SBOM is attached when the
        # download succeeds and skipped (with a warning) when it doesn't.
        continue-on-error: true
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 6
          max_attempts: 6
          retry_wait_seconds: 25
          shell: bash
          command: |
            set -euxo pipefail
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
              | sh -s -- -b "${RUNNER_TEMP}/syftbin" v1.42.3
            SYFT="${RUNNER_TEMP}/syftbin/syft"
            [ -f "${SYFT}.exe" ] && SYFT="${SYFT}.exe"
            "${SYFT}" scan "dir:cli/" -o "cyclonedx-json=${ARTIFACT_NAME}.cdx.json"

      # Cosign keyless signing — the GitHub OIDC token attests that this
      # workflow run produced the artifact. Signatures + certificates are
      # uploaded alongside the .tar.gz/.zip and verifiable via
      #   cosign verify-blob --certificate-identity '<workflow-url>' ...
      # which a downloader can run with no shared key material.
      - name: Install cosign (retried)
        # Best-effort, same rationale as the SBOM step: a sustained outage on
        # cosign's release assets must not block the binary release.
        continue-on-error: true
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 6
          retry_wait_seconds: 25
          shell: bash
          command: |
            set -euxo pipefail
            ver=v2.4.1
            os=$(uname -s | tr '[:upper:]' '[:lower:]')
            case "${os}" in mingw*|msys*|cygwin*) os=windows ;; esac
            arch=$(uname -m)
            case "${arch}" in x86_64|amd64) arch=amd64 ;; arm64|aarch64) arch=arm64 ;; esac
            ext=""; [ "${os}" = windows ] && ext=.exe
            curl -sSfL \
              "https://github.com/sigstore/cosign/releases/download/${ver}/cosign-${os}-${arch}${ext}" \
              -o "${RUNNER_TEMP}/cosign${ext}"
            chmod +x "${RUNNER_TEMP}/cosign${ext}"
            # Expose to later steps (PATH additions apply to subsequent steps).
            echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Sign artifact (cosign keyless)
        # Best-effort: skipped cleanly if cosign couldn't be installed during
        # an outage (no signature/cert produced; release still ships).
        continue-on-error: true
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euxo pipefail
          cosign sign-blob --yes \
            --output-signature "${ARTIFACT}.sig" \
            --output-certificate "${ARTIFACT}.cert" \
            "${ARTIFACT}"

      - name: Upload artifact to workflow run
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sig
            ${{ env.ARTIFACT }}.cert
            ${{ env.ARTIFACT_NAME }}.cdx.json
          # warn (not error): the binary archive is always present, but the
          # best-effort .sig/.cert/.cdx.json may be absent during a GitHub
          # outage — a missing attestation must not fail the upload.
          if-no-files-found: warn

  release:
    name: github release
    # Match the trigger above (`refs/tags/ago-v*`) — the previous value
    # was `refs/tags/v*` and silently skipped the release job when the
    # CLI tag was namespaced. ago-v0.1.0 had to be published manually
    # from the artifacts as a result.
    if: startsWith(github.ref, 'refs/tags/ago-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten + compute combined checksums
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          # Take .tar.gz, .zip, plus the cosign sig/cert and the CycloneDX
          # SBOM for each target. Everything sits at depth 2 inside the
          # downloaded artifact tree (one dir per matrix job).
          find artifacts -mindepth 2 -maxdepth 2 -type f \
            \( -name '*.tar.gz' -o -name '*.zip' \
              -o -name '*.sig' -o -name '*.cert' \
              -o -name '*.cdx.json' \) \
            -exec cp {} dist/ \;
          cd dist
          # SHA256SUMS covers the user-facing archives. Signatures and SBOMs
          # are validated through their own mechanisms (cosign / CycloneDX)
          # so they don't go in this file.
          sha256sum *.tar.gz *.zip > SHA256SUMS 2>/dev/null || true
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ago ${{ github.ref_name }}
          generate_release_notes: true
          # false: the .sig/.cert/.cdx.json globs are best-effort and may be
          # absent if a GitHub outage blocked syft/cosign. The archives +
          # SHA256SUMS always match, so the release still publishes.
          fail_on_unmatched_files: false
          body: |
            ## Verification

            **Checksum:** download `SHA256SUMS` and run
            `sha256sum -c SHA256SUMS` against the archive you downloaded.

            **Cosign signature (keyless, GitHub OIDC):**

            ```bash
            cosign verify-blob \
              --certificate <archive>.cert \
              --signature <archive>.sig \
              --certificate-identity-regexp 'https://github.com/jonnycau/agent-orchestrator/.+' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              <archive>
            ```

            **SBOM:** each target ships a CycloneDX 1.5 JSON document
            (`<archive>.cdx.json`) listing every transitive dependency
            for supply-chain audits.
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sig
            dist/*.cert
            dist/*.cdx.json
            dist/SHA256SUMS
