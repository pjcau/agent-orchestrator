# Auto-fix CodeQL alerts via LLM-suggested draft PRs.
#
# Picks every open issue labelled `auto-heal,code-scanning` (these were
# opened by `auto-heal.yml` from CodeQL alerts at
# /security/code-scanning), feeds the alerted code chunk to a cheap
# OpenRouter model, and turns the suggested diff into a **draft PR**
# linked back to the issue. Humans review and merge; nothing lands on
# main automatically.
#
# Schedule: 05:00 UTC daily (after auto-heal at 04:00 has refreshed
# the issue list). Also dispatchable manually.
#
# Why draft PR (not direct push)?
# * LLM diffs are best-effort suggestions. A human reviewer must
#   validate the security fix before merge — that is the whole
#   threat-model argument for not auto-fixing CodeQL findings.
# * Draft PRs do NOT trigger reviewers' notification noise; a human
#   reviewer marks Ready-for-review when they look at it.

name: CodeQL Autofix (draft PRs)

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Hard cap on draft PRs opened per run (default 5)."
        type: string
        default: "5"
      dry_run:
        description: "If true, run the script but do not push or open a PR."
        type: boolean
        default: false

concurrency:
  group: codeql-autofix
  cancel-in-progress: false

permissions:
  contents: write       # commit on the autofix branch
  pull-requests: write  # open the draft PR
  issues: write         # comment on the issue (success or failure)

jobs:
  fix:
    name: LLM-driven fixes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "agent-orchestrator-bot"
          git config user.email "bot@agents-orchestrator.com"

      - name: List open code-scanning issues (capped)
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_PRS: ${{ github.event.inputs.max_prs || '5' }}
        run: |
          set -euo pipefail
          # Title-shape `code-scanning: <rule> in <file>:<line>` is set by
          # auto-heal.yml. The label filter guarantees we only pick those.
          gh issue list \
            --state open \
            --label "code-scanning,auto-heal" \
            --json number,title \
            --limit 200 \
            > /tmp/issues.json
          jq -r --argjson cap "$MAX_PRS" '.[0:$cap] | .[].number' /tmp/issues.json \
            > /tmp/issue_numbers.txt
          echo "Will try issues:"
          cat /tmp/issue_numbers.txt

      - name: Fix loop
        if: hashFiles('.github/scripts/codeql_autofix.py') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          # Iterate one issue at a time, on its own branch. Each iteration
          # is atomic — a failed fix never bleeds into the next issue's
          # branch.
          while read -r issue; do
            [ -z "$issue" ] && continue
            branch="codeql-autofix/${issue}"
            echo "===== issue #$issue → $branch"
            # Always start from main so two issues never collide.
            git checkout main
            git reset --hard origin/main
            git checkout -B "$branch"

            set +e
            python .github/scripts/codeql_autofix.py \
              --issue "$issue" \
              --repo "${{ github.repository }}"
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "issue #$issue: script exited $rc; moving on."
              continue
            fi

            # Stage + commit only when the script actually applied a diff.
            if git diff --quiet; then
              echo "issue #$issue: script returned 0 but no diff staged; skipping."
              continue
            fi
            git add -A
            git commit -m "codeql-autofix: suggested fix for #$issue

            Generated by .github/scripts/codeql_autofix.py via OpenRouter
            (model: \$MODEL — see the script source for the pin). The
            diff is intentionally minimal and touches only the file
            CodeQL flagged.  A human reviewer MUST validate the fix
            before merge.

            Fixes #$issue

            Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY_RUN=true: not pushing branch / opening PR for issue #$issue"
              continue
            fi

            git push -u origin "$branch" --force-with-lease

            # Reuse the same branch's PR if one already exists (idempotent).
            if gh pr view "$branch" --json url >/dev/null 2>&1; then
              gh pr edit "$branch" --add-label "codeql-autofix"
              echo "issue #$issue: PR already open — refreshed labels."
            else
              gh pr create \
                --draft \
                --base main \
                --head "$branch" \
                --title "codeql-autofix: suggested fix for issue #$issue" \
                --body "$(printf 'Suggested fix for #%s — generated by `.github/scripts/codeql_autofix.py`.\n\n**Review checklist (please):**\n- [ ] Diff fixes the CodeQL finding without changing behaviour.\n- [ ] Tests still pass.\n- [ ] No new lint / format violations.\n\nDiff attached as `Fixes-#%s.patch` for audit.' "$issue" "$issue")" \
                --label "codeql-autofix,auto-heal" \
                || echo "issue #$issue: failed to open PR — moving on."
            fi
          done < /tmp/issue_numbers.txt
          echo "Fix loop done."

      - name: Summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Open draft PRs labelled codeql-autofix:"
          gh pr list --label codeql-autofix --state open --limit 20 \
            --json number,title,headRefName | jq -r '.[] | "  #\(.number) — \(.title) [\(.headRefName)]"' || true
