name: Nightly Research Scout

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back for bookmarks'
        required: false
        default: '7'

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Fetch GitHub starred repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python scripts/fetch_github_stars.py

      - name: Run research scout
        id: scout
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: |
          python scripts/run_research_scout.py
          # Check if findings were generated
          if [ -f .claude/research-scout-findings.md ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with findings
        if: steps.scout.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="research-scout/$(date +%Y-%m-%d)"
          git config user.name "research-scout[bot]"
          git config user.email "research-scout[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude/research-scout-state.json .claude/bookmarks.json .claude/research-scout-findings.md
          git diff --cached --quiet && exit 0
          git commit -m "research-scout: findings from $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          BODY=$(cat .claude/research-scout-findings.md)
          gh pr create \
            --title "research-scout: findings $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --label "research-scout"

      - name: Update state on main (no findings)
        if: steps.scout.outputs.has_findings != 'true'
        run: |
          git config user.name "research-scout[bot]"
          git config user.email "research-scout[bot]@users.noreply.github.com"
          git add .claude/research-scout-state.json .claude/bookmarks.json
          git diff --cached --quiet || git commit -m "research-scout: update state (no findings)"
          git push
