name: cli-rust

on:
  push:
    branches: [main, "experiment/**"]
    paths:
      - "cli/**"
      - "src/agent_orchestrator/dashboard/cli_routes.py"
      - "src/agent_orchestrator/dashboard/cli_device_flow.py"
      - "src/agent_orchestrator/dashboard/cli_device_flow_postgres.py"
      - "src/agent_orchestrator/dashboard/auth.py"
      - "tests/test_cli_routes.py"
      - "tests/test_cli_device_flow.py"
      - "tests/test_cli_device_flow_postgres.py"
      - "tests/test_auth.py"
      - ".github/workflows/cli-rust.yml"
  pull_request:
    paths:
      - "cli/**"
      - "src/agent_orchestrator/dashboard/cli_routes.py"
      - "src/agent_orchestrator/dashboard/cli_device_flow.py"
      - "src/agent_orchestrator/dashboard/cli_device_flow_postgres.py"
      - "src/agent_orchestrator/dashboard/auth.py"
      - "tests/test_cli_routes.py"
      - "tests/test_cli_device_flow.py"
      - "tests/test_cli_device_flow_postgres.py"
      - "tests/test_auth.py"
      - ".github/workflows/cli-rust.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Check formatting
        working-directory: cli
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Clippy (deny warnings)
        working-directory: cli
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Build
        working-directory: cli
        run: cargo build --locked --verbose
      - name: Test
        working-directory: cli
        # Tests on Linux/Windows do not have a keychain backend; the integration
        # tests bypass keyring entirely via AGO_TOKEN, but unit tests in
        # `auth::tests` only touch MemoryStorage, so this works portably.
        run: cargo test --locked --verbose

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          cache-targets: false
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit (fail on actual vulns, not on unmaintained warnings)
        working-directory: cli
        run: |
          # `cargo audit` exits non-zero on vulnerabilities; informational
          # warnings (`unmaintained`, `unsound`, `notice`) only become errors
          # with --deny warnings, which we explicitly do NOT pass — those
          # often come from transitive deps we cannot fix and are tracked
          # separately. A real CVE will still fail this job.
          cargo audit

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: cli/Cargo.toml
          arguments: --all-features
          # Verify the four gates separately so a license violation does not
          # mask an advisory and vice-versa. Each gate is configured in
          # cli/deny.toml.
          command: check advisories licenses bans sources

  python-server-tests:
    name: python (cli server endpoints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-cli-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"
      - name: Lint server-side CLI modules
        run: |
          ruff check \
            src/agent_orchestrator/dashboard/cli_routes.py \
            src/agent_orchestrator/dashboard/cli_device_flow.py \
            src/agent_orchestrator/dashboard/cli_device_flow_postgres.py \
            src/agent_orchestrator/dashboard/auth.py \
            tests/test_cli_routes.py \
            tests/test_cli_device_flow.py \
            tests/test_cli_device_flow_postgres.py
      - name: Run pytest
        run: |
          pytest \
            tests/test_cli_routes.py \
            tests/test_cli_device_flow.py \
            tests/test_cli_device_flow_postgres.py \
            tests/test_auth.py \
            tests/test_import_boundary.py -v
