name: Security Autofix

on:
  schedule:
    # Daily at 03:00 UTC (after nightly research at 02:00)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  autofix:
    name: Fix Code Scanning Alerts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev,dashboard]"

      - name: Fetch open code scanning alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERTS=$(gh api repos/${{ github.repository }}/code-scanning/alerts \
            --jq '[.[] | select(.state=="open")] | length')
          echo "count=$ALERTS" >> "$GITHUB_OUTPUT"
          echo "Found $ALERTS open code scanning alerts"

          # Save alert details for the fix script
          gh api repos/${{ github.repository }}/code-scanning/alerts \
            --jq '[.[] | select(.state=="open") | {
              number: .number,
              rule: .rule.id,
              severity: .rule.security_severity_level,
              file: .most_recent_instance.location.path,
              line: .most_recent_instance.location.start_line,
              description: .rule.description
            }]' > /tmp/alerts.json

      - name: Run security fixes
        if: steps.alerts.outputs.count != '0'
        run: |
          python scripts/fix_security_alerts.py /tmp/alerts.json

      - name: Run tests
        if: steps.alerts.outputs.count != '0'
        run: pytest --tb=short -q

      - name: Check for changes
        if: steps.alerts.outputs.count != '0'
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="security-autofix/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve code scanning security alerts

          Automated security fixes applied by security-autofix workflow.
          Alerts fixed: $(cat /tmp/alerts.json | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))')

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "fix: resolve code scanning security alerts ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated security fixes from daily code scanning analysis
          - Alerts addressed: see commit message for count
          - Categories: log-injection, path-injection, weak-hashing, dependency CVEs

          ## Test plan
          - [x] All tests pass in CI
          - [ ] Review fixes for correctness
          - [ ] Verify alerts are resolved after merge

          🤖 Generated by security-autofix workflow
          EOF
          )" \
            --label "security"
