name: Uptime Check

on:
  schedule:
    # Every 10 minutes — granular enough to catch incidents within one billing
    # interval of most uptime SLAs, cheap enough (144 runs/day) to stay well
    # within the GitHub Actions free tier.
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    name: HTTPS probe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        domain:
          - agents-orchestrator.com
          - monitoring.agents-orchestrator.com
    steps:
      - name: Probe ${{ matrix.domain }}
        id: probe
        run: |
          DOMAIN="${{ matrix.domain }}"
          OK_CODES='^(200|301|302|401|403)$'
          # Two-level probe so a temporarily untrusted cert (e.g. during LE
          # rate-limit windows or cert renewals) doesn't flood the on-call
          # inbox. "Down" == cannot reach HTTPS even with cert validation
          # disabled. "Degraded" == reachable but cert not trusted.
          for i in 1 2 3; do
            CODE=$(curl -sSI --max-time 15 "https://$DOMAIN/" \
              -o /dev/null -w "%{http_code}" || echo 000)
            if echo "$CODE" | grep -qE "$OK_CODES"; then
              echo "OK: $DOMAIN returned HTTP $CODE (attempt $i, trusted TLS)"
              echo "status=ok" >> "$GITHUB_OUTPUT"
              echo "code=$CODE" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Strict TLS failed — retry with cert validation disabled to see
            # if the HTTP layer is alive at all.
            INSECURE_CODE=$(curl -skSI --max-time 15 "https://$DOMAIN/" \
              -o /dev/null -w "%{http_code}" || echo 000)
            if echo "$INSECURE_CODE" | grep -qE "$OK_CODES"; then
              echo "DEGRADED: $DOMAIN serving untrusted cert but HTTP $INSECURE_CODE (attempt $i)"
              echo "status=degraded" >> "$GITHUB_OUTPUT"
              echo "code=$INSECURE_CODE" >> "$GITHUB_OUTPUT"
              # Pass the job — cert problems are a separate concern, not an
              # outage. A follow-up cert-expiry workflow should surface them.
              exit 0
            fi
            echo "Attempt $i for $DOMAIN: strict HTTP $CODE, insecure HTTP $INSECURE_CODE"
            sleep 15
          done
          echo "status=down" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Open or update incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const domain = "${{ matrix.domain }}";
            const code = "${{ steps.probe.outputs.code }}" || "000";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const title = `[uptime] ${domain} is down`;
            const bodyLine = `- ${now} — HTTP ${code} — [run](${runUrl})`;

            // Reuse an open incident issue for the same domain to avoid spam.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-incident',
              per_page: 20,
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: bodyLine,
              });
              core.info(`Commented on incident #${match.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  `Automated uptime check detected ${domain} is unreachable.`,
                  ``,
                  `Timeline:`,
                  bodyLine,
                  ``,
                  `This issue is reused for subsequent failures. Close it once the service is back up.`,
                ].join('\n'),
                labels: ['uptime-incident', 'automated', 'needs-triage'],
              });
            }
