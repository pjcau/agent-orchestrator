version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
    groups:
      # Single PR for ALL pip updates (minor/patch/major). Per-package PRs
      # editing the same pyproject.toml region conflict with each other and
      # can only land one-per-rebase-cycle — grouping eliminates that cascade.
      python:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      # Single PR for all action bumps — they edit the same workflow files.
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
    groups:
      docker-dashboard:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"

  - package-ecosystem: "docker"
    directory: "/docker/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
    groups:
      docker-docs:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"

  # npm dependencies (docs site)
  - package-ecosystem: "npm"
    directory: "/docs/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "deps(docs)"
    groups:
      # Single PR for all npm updates — react/react-dom etc. share
      # package.json / package-lock.json and conflict per-package otherwise.
      npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"
