# ============================================================
# Production Docker Compose — Agent Orchestrator
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (set in .env.prod or via GitHub Secrets):
#   POSTGRES_PASSWORD, JWT_SECRET_KEY, OAUTH_CLIENT_ID,
#   OAUTH_CLIENT_SECRET, BASE_URL, OPENROUTER_API_KEY
# ============================================================

services:
  # --- Nginx reverse proxy (SSL termination) ---
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped

  # --- Dashboard (FastAPI + orchestrator) ---
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    environment:
      - PYTHONPATH=/workspace/src
      - DATABASE_URL=postgresql://orchestrator:${POSTGRES_PASSWORD}@postgres:5432/orchestrator
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - BASE_URL=${BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=production
      - CORS_ALLOWED_ORIGINS=${BASE_URL}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
    volumes:
      - ./jobs:/workspace/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,ssl; urllib.request.urlopen('https://localhost:5005/health',context=ssl._create_unverified_context())"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: python -m agent_orchestrator.dashboard --host 0.0.0.0 --port 5005
    restart: unless-stopped

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orchestrator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Redis (session cache + semantic cache) ---
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Node Exporter (host metrics for Prometheus) ---
  node-exporter:
    image: prom/node-exporter:v1.8.2
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - "9100"
    restart: unless-stopped

  # --- cAdvisor (container metrics for Prometheus) ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"
    restart: unless-stopped

  # --- AWS Cost Exporter (Cost Explorer → Prometheus) ---
  aws-cost-exporter:
    build:
      context: ./docker/aws-cost-exporter
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=eu-west-1
    expose:
      - "9101"
    restart: unless-stopped

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"  # localhost only — access via SSH tunnel
    restart: unless-stopped

  # --- Grafana (exposed via Nginx at monitoring.agents-orchestrator.com) ---
  grafana:
    image: grafana/grafana:11.5.2
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitoring.agents-orchestrator.com
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      # SMTP for alert emails
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_USER}
      - GF_SMTP_FROM_NAME=Agent Orchestrator Alerts
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Job archiver (weekly S3 upload + PostgreSQL metadata) ---
  archiver:
    build:
      context: .
      dockerfile: docker/archiver/Dockerfile
    environment:
      - DATABASE_URL=postgresql://orchestrator:${POSTGRES_PASSWORD}@postgres:5432/orchestrator
      # AWS credentials come from the host IAM role — no access keys needed here.
    volumes:
      - ./jobs:/workspace/jobs
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--jobs-dir", "/workspace/jobs", "--days", "7"]
    restart: unless-stopped

  # --- Grafana Tempo (distributed tracing backend) ---
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml
      - tempodata:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4318:4318"
    restart: unless-stopped

  # --- Certbot (auto-renew Let's Encrypt) ---
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - ./certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
  tempodata:
  certbot-webroot:
