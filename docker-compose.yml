services:
  # PostgreSQL for checkpointing + user store
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Dashboard — real-time monitoring UI with interactive prompt
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "5005:5005"
    environment:
      - PYTHONPATH=/workspace/src
      - DATABASE_URL=postgresql://orchestrator:orchestrator@postgres:5432/orchestrator
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    env_file:
      - path: .env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m agent_orchestrator.dashboard --host 0.0.0.0 --port 5005

  # Nginx reverse proxy — HTTPS termination + Let's Encrypt
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/nginx/ssl:ro
    depends_on:
      - dashboard
    restart: unless-stopped

  # Certbot — auto-renew Let's Encrypt certificates
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Documentation site (Docusaurus)
  docs:
    build:
      context: .
      dockerfile: docker/docs/Dockerfile
    volumes:
      - ./docs/website/docs:/app/docs
      - ./docs/website/src:/app/src
      - ./docs/website/static:/app/static
      - ./docs/website/docusaurus.config.js:/app/docusaurus.config.js
      - ./docs/website/sidebars.js:/app/sidebars.js
    ports:
      - "3000:3000"
    command: npm start -- --host 0.0.0.0 --port 3000

volumes:
  pgdata:
  certbot-webroot:
  certbot-certs:
