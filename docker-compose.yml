services:
  # PostgreSQL for checkpointing
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Python development environment
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace/src
      - DATABASE_URL=postgresql://orchestrator:orchestrator@postgres:5432/orchestrator
    depends_on:
      postgres:
        condition: service_healthy
    command: sleep infinity

  # Test runner
  test:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace:ro
      - test-results:/results
      - pytest-cache:/tmp/pytest-cache
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace/src
    command: pytest --tb=short --junitxml=/results/report.xml -o cache_dir=/tmp/pytest-cache

  # Linter
  lint:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace:ro
      - ruff-cache:/tmp/ruff-cache
    working_dir: /workspace
    environment:
      - RUFF_CACHE_DIR=/tmp/ruff-cache
    command: ruff check src/ tests/

  # Dashboard — real-time monitoring UI with interactive prompt
  dashboard:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "5005:5005"
    environment:
      - PYTHONPATH=/workspace/src
      - DATABASE_URL=postgresql://orchestrator:orchestrator@postgres:5432/orchestrator
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    env_file:
      - path: .env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m agent_orchestrator.dashboard --host 0.0.0.0 --port 5005

  # Documentation site (Docusaurus)
  docs:
    build:
      context: .
      dockerfile: docker/docs/Dockerfile
    volumes:
      - ./docs/website/docs:/app/docs
      - ./docs/website/src:/app/src
      - ./docs/website/static:/app/static
      - ./docs/website/docusaurus.config.js:/app/docusaurus.config.js
      - ./docs/website/sidebars.js:/app/sidebars.js
    ports:
      - "3000:3000"
    command: npm start -- --host 0.0.0.0 --port 3000

  # Format checker
  format:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace:ro
      - ruff-cache:/tmp/ruff-cache
    working_dir: /workspace
    environment:
      - RUFF_CACHE_DIR=/tmp/ruff-cache
    command: ruff format --check src/ tests/

volumes:
  pgdata:
  test-results:
  pytest-cache:
  ruff-cache:
