services:
  # Python development environment
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace/src
    command: sleep infinity

  # Test runner
  test:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace:ro
      - test-results:/results
      - pytest-cache:/tmp/pytest-cache
    working_dir: /workspace
    environment:
      - PYTHONPATH=/workspace/src
    command: pytest --tb=short --junitxml=/results/report.xml -o cache_dir=/tmp/pytest-cache

  # Linter
  lint:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace:ro
      - ruff-cache:/tmp/ruff-cache
    working_dir: /workspace
    environment:
      - RUFF_CACHE_DIR=/tmp/ruff-cache
    command: ruff check src/ tests/

  # Format checker
  format:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/workspace:ro
      - ruff-cache:/tmp/ruff-cache
    working_dir: /workspace
    environment:
      - RUFF_CACHE_DIR=/tmp/ruff-cache
    command: ruff format --check src/ tests/

volumes:
  test-results:
  pytest-cache:
  ruff-cache:
