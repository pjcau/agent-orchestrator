# ============================================================
# Split-process override — Agent Orchestrator
# ============================================================
# Run gateway API and agent runtime as separate services for
# independent horizontal scaling.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.split.yml up -d
#
# In split mode:
#   gateway  :5006  -- REST management endpoints (config, jobs, MCP, metrics)
#   runtime  :5007  -- Agent execution, team runs, WebSocket streaming
#
# nginx routes /api/prompt, /api/agent/*, /api/team/*, /ws/* to runtime;
# all other /api/* and /metrics to gateway.
# ============================================================

services:
  # Disable the monolithic dashboard in split mode
  dashboard:
    profiles:
      - monolith  # excluded unless explicitly requested

  # --- Gateway API (management plane) ---
  gateway:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    environment:
      - PYTHONPATH=/workspace/src
      - DATABASE_URL=postgresql://orchestrator:${POSTGRES_PASSWORD}@postgres:5432/orchestrator
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - BASE_URL=${BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=production
      - CORS_ALLOWED_ORIGINS=${BASE_URL}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
    volumes:
      - ./jobs:/workspace/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,ssl; urllib.request.urlopen('https://localhost:5006/health',context=ssl._create_unverified_context())",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: python -m agent_orchestrator.dashboard.server --mode gateway --host 0.0.0.0 --port 5006
    expose:
      - "5006"
    restart: unless-stopped

  # --- Agent Runtime (execution plane) ---
  runtime:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    environment:
      - PYTHONPATH=/workspace/src
      - DATABASE_URL=postgresql://orchestrator:${POSTGRES_PASSWORD}@postgres:5432/orchestrator
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - BASE_URL=${BASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=production
      - CORS_ALLOWED_ORIGINS=${BASE_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
    volumes:
      - ./jobs:/workspace/jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,ssl; urllib.request.urlopen('https://localhost:5007/api/agent/config',context=ssl._create_unverified_context())",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: python -m agent_orchestrator.dashboard.server --mode runtime --host 0.0.0.0 --port 5007
    expose:
      - "5007"
    restart: unless-stopped

  # --- Nginx: route requests to gateway or runtime ---
  nginx:
    volumes:
      - ./docker/nginx/nginx-split.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
      runtime:
        condition: service_healthy
