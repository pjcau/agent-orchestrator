[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-orchestrator"
version = "0.1.0"
description = "Provider-agnostic AI agent orchestration framework"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
openai = ["openai>=1.50"]
google = ["google-generativeai>=0.8"]
postgres = ["asyncpg>=0.29"]
dashboard = ["fastapi>=0.115", "uvicorn[standard]>=0.32", "websockets>=13.0"]
all = ["anthropic>=0.40", "openai>=1.50", "google-generativeai>=0.8", "asyncpg>=0.29", "fastapi>=0.115", "uvicorn[standard]>=0.32", "websockets>=13.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agent_orchestrator"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
