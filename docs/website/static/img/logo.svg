<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Outer orbit ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.25"/>

  <!-- Connection lines from center to orbit nodes -->
  <line x1="100" y1="100" x2="100" y2="20" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="169" y2="60" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="169" y2="140" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="100" y2="180" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="31" y2="140" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="31" y2="60" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>

  <!-- Center core (orchestrator) -->
  <circle cx="100" cy="100" r="28" fill="url(#core)" opacity="0.9"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

  <!-- Inner symbol: play/orchestrate triangle -->
  <polygon points="92,88 92,112 114,100" fill="#ffffff" opacity="0.9"/>

  <!-- Orbit agent nodes -->
  <circle cx="100" cy="20" r="12" fill="url(#node)" opacity="0.85"/>
  <text x="100" y="24" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold" font-family="system-ui">A</text>

  <circle cx="169" cy="60" r="12" fill="url(#node)" opacity="0.85"/>
  <text x="169" y="64" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold" font-family="system-ui">B</text>

  <circle cx="169" cy="140" r="12" fill="url(#node)" opacity="0.85"/>
  <text x="169" y="144" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold" font-family="system-ui">C</text>

  <circle cx="100" cy="180" r="12" fill="url(#node)" opacity="0.85"/>
  <text x="100" y="184" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold" font-family="system-ui">D</text>

  <circle cx="31" cy="140" r="12" fill="url(#node)" opacity="0.85"/>
  <text x="31" y="144" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold" font-family="system-ui">E</text>

  <circle cx="31" cy="60" r="12" fill="url(#node)" opacity="0.85"/>
  <text x="31" y="64" text-anchor="middle" fill="#1e1b4b" font-size="12" font-weight="bold" font-family="system-ui">F</text>

  <!-- Pulse rings (decorative) -->
  <circle cx="100" cy="100" r="38" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  <circle cx="100" cy="100" r="48" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
</svg>
